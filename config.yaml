# ──────────── Default configuration ────────────
# After Colab training, copy best.pt to models/best.pt and switch
# model_path to "models/best.pt" (or use the `custom` scenario below).
default:
  detector:
    model_path: "yolov10n.pt"   # swap to "models/best.pt" after training
    confidence_threshold: 0.4

  depth:
    model_name: "MiDaS_small"
    frame_interval: 3          # run depth every N frames (saves CPU)

  tracker:
    iou_threshold: 0.4
    announcement_cooldown_frames: 60   # re-announce after this many frames

  speech:
    rate: 150
    volume: 1.0

  camera:
    device_id: 0
    width: 640
    height: 480

  target_classes:
    - person
    - chair
    - table
    - car
    - bus
    - bicycle
    - motorcycle
    - truck
    - dog
    - cat
    - stairs
    - door
    - traffic light
    - pole

# ──────────── Scenario overrides ────────────
indoor:
  detector:
    model_path: "yolov10s.pt"
    confidence_threshold: 0.45
  depth:
    frame_interval: 2
  target_classes:
    - person
    - chair
    - table
    - sofa
    - bed
    - toilet
    - tv
    - laptop
    - door
    - dog
    - cat

outdoor:
  detector:
    model_path: "yolov10s.pt"
    confidence_threshold: 0.5
  camera:
    width: 1280
    height: 720
  depth:
    frame_interval: 3
  target_classes:
    - person
    - car
    - bus
    - truck
    - motorcycle
    - bicycle
    - traffic light
    - stop sign
    - pole
    - stairs
    - dog

high_performance:
  detector:
    model_path: "yolov10n.pt"
    confidence_threshold: 0.35
  depth:
    frame_interval: 5          # less frequent depth → higher FPS
  camera:
    width: 640
    height: 480

# ──────────── Custom-trained model (after Colab training) ────────────
# Copy best.pt to models/best.pt, then run:
#   python run_app.py --scenario custom
custom:
  detector:
    model_path: "models/best.pt"
    confidence_threshold: 0.4
  depth:
    frame_interval: 3
  # Class names as stored in best.pt (Open Images label convention)
  target_classes:
    - person
    - chair
    - table
    - couch
    - bed
    - door
    - bench
    - waste_container
    - fire_hydrant
    - postbox
    - car
    - bus
    - truck
    - bicycle
    - dog

# High performance scenario (for powerful hardware)
high_performance:
  # Model settings - Maximum accuracy
  model_name: 'yolov8l.pt'
  confidence_threshold: 0.4
  device: 'cuda'  # Prefer GPU if available
  
  # Camera settings - High resolution
  camera_index: 0
  frame_width: 1920
  frame_height: 1080
  
  # Audio settings
  voice_rate: 250
  voice_volume: 0.9
  announcement_cooldown: 1.5
  
  # Detection settings - All important objects
  target_classes:
    # People and animals
    - 'person'
    - 'cat'
    - 'dog'
    - 'bird'
    - 'horse'
    - 'sheep'
    - 'cow'
    # Vehicles
    - 'bicycle'
    - 'car'
    - 'motorcycle'
    - 'airplane'
    - 'bus'
    - 'train'
    - 'truck'
    - 'boat'
    # Furniture
    - 'bench'
    - 'chair'
    - 'couch'
    - 'bed'
    - 'dining table'
    - 'toilet'
    # Electronics
    - 'tv'
    - 'laptop'
    - 'mouse'
    - 'remote'
    - 'keyboard'
    - 'cell phone'
    # Kitchen items
    - 'microwave'
    - 'oven'
    - 'toaster'
    - 'sink'
    - 'refrigerator'
    - 'bottle'
    - 'wine glass'
    - 'cup'
    - 'fork'
    - 'knife'
    - 'spoon'
    - 'bowl'
    # Sports and recreation
    - 'frisbee'
    - 'skis'
    - 'snowboard'
    - 'sports ball'
    - 'kite'
    - 'baseball bat'
    - 'baseball glove'
    - 'skateboard'
    - 'surfboard'
    - 'tennis racket'
    # Accessories
    - 'backpack'
    - 'umbrella'
    - 'handbag'
    - 'tie'
    - 'suitcase'
    - 'book'
    - 'clock'
    - 'vase'
    - 'scissors'
    - 'teddy bear'
    - 'hair drier'
    - 'toothbrush'
    - 'potted plant'
  
  # Spatial analysis settings
  distance_thresholds:
    close: 0.35
    medium: 0.12
    far: 0.03

# Low resource scenario (for older/slower hardware)
low_resource:
  # Model settings - Fastest processing
  model_name: 'yolov8n.pt'
  confidence_threshold: 0.6
  device: 'cpu'  # Force CPU to save GPU memory
  
  # Camera settings - Lower resolution
  camera_index: 0
  frame_width: 320
  frame_height: 240
  
  # Audio settings
  voice_rate: 180
  voice_volume: 0.8
  announcement_cooldown: 3.0
  
  # Detection settings - Essential objects only
  target_classes:
    - 'person'
    - 'chair'
    - 'table'
    - 'car'
    - 'bicycle'
    - 'bottle'
    - 'cup'
  
  # Spatial analysis settings
  distance_thresholds:
    close: 0.5
    medium: 0.2
    far: 0.1

# Usage instructions:
# python run_app.py --scenario default
# python run_app.py --scenario indoor
# python run_app.py --scenario outdoor
# python run_app.py --scenario high_performance
# python run_app.py --scenario low_resource
